<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Promedio General</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            color: #1f2937;
        }

        .promedio {
            margin: 25px 0;
            padding: 25px;
            background: #ecfdf5;
            border-left: 6px solid #16a34a;
            border-radius: 10px;
            font-size: 30px;
            font-weight: bold;
            color: #166534;
        }

        .sin-registros {
            color: #dc2626;
            font-size: 20px;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Promedio General</h1>

    {% if promedio %}
        <div class="promedio">
            {{ promedio|floatformat:2 }}
        </div>
    {% else %}
        <p class="sin-registros">No hay calificaciones registradas.</p>
    {% endif %}

    <a href="{% url 'listar_calificaciones' %}">Volver al listado</a>
</div>

</body>
</html>
